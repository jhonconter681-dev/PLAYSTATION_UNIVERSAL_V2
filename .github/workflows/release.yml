name: "PUCE Windows Release"

on:
  push:
    tags:
      - 'v*'   # Dispara en tags como v1.0.0, v1.0.2, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PASO 1 — Compilar el motor Rust en Windows (genera puce_core.dll)
  # ═══════════════════════════════════════════════════════════════════════════
  build-rust-core:
    name: "🦀 Compilar Motor Rust (Windows)"
    runs-on: windows-latest

    steps:
      # 1a. Descargar el código fuente
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # 1b. Instalar el toolchain estable de Rust para MSVC (nativo de Windows)
      - name: "🔧 Instalar Rust (stable-x86_64-pc-windows-msvc)"
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      # 1c. Cache del registro de Cargo para acelerar builds posteriores
      - name: "💾 Cache de Cargo"
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      # 1d. Compilar el workspace completo en modo release para Windows
      - name: "🔨 cargo build --release"
        run: cargo build --release --target x86_64-pc-windows-msvc

      # 1e. Subir la DLL del motor como artefacto
      - name: "⬆️ Subir puce_core.dll"
        uses: actions/upload-artifact@v4
        with:
          name: puce_core_dll
          path: target\x86_64-pc-windows-msvc\release\puce_core.dll
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # PASO 2 — Compilar la interfaz Flutter para Windows
  # ═══════════════════════════════════════════════════════════════════════════
  build-flutter-ui:
    name: "🎨 Compilar UI Flutter (Windows)"
    needs: build-rust-core
    runs-on: windows-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # 2a. Instalar Flutter (canal estable)
      - name: "🔧 Instalar Flutter (stable)"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 2b. Descargar la DLL del motor compilada en el paso anterior
      - name: "⬇️ Descargar puce_core.dll"
        uses: actions/download-artifact@v4
        with:
          name: puce_core_dll
          path: UI\lib\ffi\

      # 2c. Descargar dependencias de Dart/Flutter
      - name: "📦 flutter pub get"
        working-directory: UI
        run: flutter pub get

      # 2d. Compilar la aplicación Flutter para Windows en modo release
      - name: "🔨 flutter build windows --release"
        working-directory: UI
        run: flutter build windows --release

      # 2e. Subir la carpeta completa de la aplicación como artefacto
      - name: "⬆️ Subir binarios de la app"
        uses: actions/upload-artifact@v4
        with:
          name: PUCE_windows_app
          path: UI\build\windows\x64\runner\Release\
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # PASO 3 — Empaquetar y publicar el Release en GitHub
  # ═══════════════════════════════════════════════════════════════════════════
  publish-release:
    name: "🚀 Publicar Release de Windows"
    needs: build-flutter-ui
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # 3a. Descargar los artefactos compilados
      - name: "⬇️ Descargar app compilada"
        uses: actions/download-artifact@v4
        with:
          name: PUCE_windows_app
          path: release\PUCE\

      # 3b. Empaquetar todo en un .zip
      - name: "🗜️ Crear PUCE-windows.zip"
        run: Compress-Archive -Path release\PUCE\* -DestinationPath release\PUCE-windows.zip

      # 3c. Publicar el Release con el .zip adjunto
      - name: "📢 Publicar GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "🎮 PUCE ${{ github.ref_name }} — Windows"
          body: |
            ## 🎮 PUCE — PlayStation Universal Controller Emulator
            
            Convierte **cualquier mando** (Xbox, Nintendo, teclado, ratón, HID genérico) en una
            **señal real de control PlayStation** (desde PS1 hasta DualSense Edge).
            
            ### 📦 Descarga
            
            | Plataforma | Archivo |
            |------------|---------|
            | 🪟 Windows 10/11 | `PUCE-windows.zip` |
            
            ### 🚀 Instalación rápida
            1. Instala el driver **[ViGEmBus](https://github.com/nefarius/ViGEmBus/releases/latest)** (requerido para el control virtual).
            2. Descarga y descomprime `PUCE-windows.zip`.
            3. Ejecuta **`PUCE.exe`**.
            4. Conecta tu mando — PUCE lo detecta y mapea automáticamente.
            
            > ⚠️ **Requisito:** ViGEmBus debe estar instalado antes de ejecutar PUCE.
          files: release\PUCE-windows.zip
