name: puce_ui
description: PUCE - PlayStation Universal Controller Emulator UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # Persistence
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Fonts
  google_fonts: ^6.2.1

  # FFI / Native
  ffi: ^2.1.2

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.3

  # File picking
  file_picker: ^8.0.3

  # UI extras
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
