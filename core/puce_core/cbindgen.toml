# cbindgen configuration for puce_core
# Run: cbindgen --config cbindgen.toml --crate puce_core --output puce_core.h

language = "C"
header = """
/*
 * PUCE — PlayStation Universal Controller Emulator
 * Auto-generated C header — DO NOT EDIT MANUALLY
 * Generated by cbindgen from puce_core
 */
"""

include_guard = "PUCE_CORE_H"

# Use C-style (not C++) include guard
cpp_compat = true

# Prefix every exported symbol with "puce_"
# (already prefixed in Rust, this is just a safety guard)
[export]
prefix = ""
exclude = []

# Render doc comments as C-style block comments
[parse]
parse_deps = false

[documentation]
style = "c99"

[defines]
"target_os = windows" = "_WIN32"
"target_os = linux"   = "__linux__"
"target_os = macos"   = "__APPLE__"
